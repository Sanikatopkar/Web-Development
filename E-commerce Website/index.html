<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeMultiStore | Premium Shopping</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">LUXE<span>MULTI</span></div>
        <div class="header-controls">
            <input type="text" id="searchInput" placeholder="Search items..." onkeyup="filterProducts()">
            <button class="theme-toggle" onclick="toggleDarkMode()">🌓</button>
            <div class="cart-trigger" onclick="toggleCart()">
                <span id="cart-badge">0</span>🛒
            </div>
        </div>
    </header>

    <nav class="category-bar">
        <button onclick="filterByCategory('all')">All</button>
        <button onclick="filterByCategory('clothing')">Clothing</button>
        <button onclick="filterByCategory('electrical')">Electrical</button>
        <button onclick="filterByCategory('educational')">Educational</button>
        <button onclick="filterByCategory('food')">Food</button>
    </nav>

    <main id="storefront" class="product-grid">
        </main>

    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <button class="close-btn" onclick="toggleCart()">✕</button>
        </div>
        <div id="cart-items" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Subtotal</span>
                <span id="cart-total">₹0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout Now</button>
        </div>
    </div>

    <div id="overlay" onclick="toggleCart()"></div>

    <script src="script.js"></script>
</body>
</html>
